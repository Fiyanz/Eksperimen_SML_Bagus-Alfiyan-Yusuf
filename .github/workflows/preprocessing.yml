name: Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tensorflow scikit-learn numpy

      - name: Download dataset
        run: |
          pip install kaggle
          mkdir -p ~/.kaggle
          echo '${{ secrets.KAGGLE_JSON }}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle datasets download -d indraagustian/red-chili-pepper-pests-dataset -p ./dataset --unzip

      - name: Run preprocessing script
        env:
          DATASET_DIR: ./dataset
        run: |
          cd preprocessing
          python automate_Bagus-Alfiyan-Yusuf.py --dataset-dir ./dataset --output-dir red_chili_pepper_pests_preprocessed

      - name: Upload preprocessed data
        uses: actions/upload-artifact@v4
        with:
          name: red_chili_pepper_pests_preprocessed
          path: preprocessing/red_chili_pepper_pests_preprocessed/
          retention-days: 30
